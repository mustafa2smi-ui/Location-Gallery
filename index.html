<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRIP Track - My Journey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .timeline-line {
            position: absolute; left: 19px; top: 0; bottom: 0;
            width: 2px; background: #94a3b8; z-index: 0;
        }
        .deleted-text { color: #94a3b8; text-decoration: line-through; font-style: italic; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <header class="bg-blue-700 text-white p-4 shadow-md flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <button onclick="toggleMenu()"><i data-lucide="menu"></i></button>
            <h1 class="text-xl font-bold">TRIP Track 📍</h1>
        </div>
        <button onclick="endTrip()" class="bg-red-500 px-3 py-1 rounded text-sm font-bold shadow hover:bg-red-600 transition">End Trip</button>
    </header>

    <div id="sideMenu" class="fixed inset-0 bg-black bg-opacity-50 z-[60] hidden" onclick="toggleMenu()">
        <div class="bg-white w-64 h-full p-5 shadow-xl" onclick="event.stopPropagation()">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">History</h2>
            <div id="tripHistoryList" class="text-gray-600 space-y-2">
                <p class="text-sm italic">No past trips yet...</p>
            </div>
        </div>
    </div>

    <main class="max-w-md mx-auto p-4 flex-grow w-full">
        <div class="mb-6 bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
            <input type="text" id="tripNameInput" placeholder="Trip Ka Naam (e.g. Chennai Trip)" 
                   class="w-full border-none outline-none text-lg font-bold text-blue-800" onchange="saveTripName()">
            <p class="text-xs text-gray-500 mt-1">Date: 📅 <span id="displayDate"></span></p>
        </div>

        <div class="relative min-h-[300px]">
            <div class="timeline-line"></div>
            <div id="locationTimeline" class="space-y-6 relative z-10">
                </div>
        </div>

        <div class="h-24"></div> <button onclick="recordLocation()" 
                class="fixed bottom-20 right-6 bg-green-600 text-white p-4 rounded-full shadow-2xl hover:scale-105 active:scale-95 transition-all flex items-center gap-2">
            <i data-lucide="map-pin"></i> <span class="font-bold">Record My Location</span>
        </button>
    </main>

    <footer class="bg-gray-800 text-gray-400 p-6 text-center text-sm">
        <p>© 2026 TRIP Track | Made for Travelers</p>
        <div class="flex justify-center gap-4 mt-2">
            <a href="#" class="hover:text-white">Privacy</a>
            <a href="#" class="hover:text-white">Settings</a>
            <a href="#" class="hover:text-white">Help</a>
        </div>
    </footer>

    <script>
        let currentTripData = JSON.parse(localStorage.getItem('currentTrip')) || [];
        let tripName = localStorage.getItem('tripName') || "";

        // Initialization
        window.onload = () => {
            lucide.createIcons();
            document.getElementById('displayDate').innerText = new Date().toLocaleDateString();
            document.getElementById('tripNameInput').value = tripName;
            renderTimeline();
            setupReminders();
        };

        function toggleMenu() {
            const menu = document.getElementById('sideMenu');
            menu.classList.toggle('hidden');
        }

        function saveTripName() {
            tripName = document.getElementById('tripNameInput').value;
            localStorage.setItem('tripName', tripName);
        }

        async function recordLocation() {
            if (!navigator.geolocation) return alert("Location support nahi hai!");
            
            // Temporary placeholder
            const tempId = Date.now();
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude, longitude } = pos.coords;
                
                // Fetch Address using OpenStreetMap (Reverse Geocoding)
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}`);
                    const data = await res.json();
                    const address = data.display_name.split(',')[0] + ", " + (data.address.city || data.address.state || "");
                    
                    const entry = { id: tempId, time, location: address, deleted: false };
                    currentTripData.push(entry);
                    saveAndRender();
                } catch (e) {
                    alert("Address fetch karne mein error!");
                }
            });
        }

        function deleteLocation(id) {
            const index = currentTripData.findIndex(item => item.id === id);
            if (index !== -1) {
                currentTripData[index].deleted = true;
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('currentTrip', JSON.stringify(currentTripData));
            renderTimeline();
        }

        function renderTimeline() {
            const container = document.getElementById('locationTimeline');
            container.innerHTML = "";
            
            currentTripData.forEach(item => {
                const div = document.createElement('div');
                div.className = "flex items-start gap-4 animate-in fade-in duration-500";
                
                if (item.deleted) {
                    div.innerHTML = `
                        <div class="w-10 h-10 bg-gray-300 rounded-full border-4 border-white shadow flex-shrink-0 flex items-center justify-center">
                            <i data-lucide="x" class="w-4 h-4 text-gray-500"></i>
                        </div>
                        <div class="bg-gray-200 p-3 rounded-lg flex-grow border border-dashed border-gray-400">
                            <p class="deleted-text text-sm">You are deleted (Record removed)</p>
                        </div>
                    `;
                } else {
                    div.innerHTML = `
                        <div class="w-10 h-10 bg-blue-600 rounded-full border-4 border-white shadow flex-shrink-0"></div>
                        <div class="bg-white p-3 rounded-lg shadow-sm flex-grow relative group">
                            <button onclick="deleteLocation(${item.id})" class="absolute -top-2 -right-2 bg-red-100 text-red-600 rounded-full p-1 opacity-0 group-hover:opacity-100 transition shadow-sm border border-red-200">
                                <i data-lucide="trash-2" class="w-3 h-3"></i>
                            </button>
                            <span class="text-[10px] font-bold text-blue-500 uppercase tracking-wider">${item.time}</span>
                            <p class="text-gray-800 font-semibold leading-tight mt-1">📍 ${item.location}</p>
                        </div>
                    `;
                }
                container.appendChild(div);
            });
            lucide.createIcons();
        }

        function endTrip() {
            if (currentTripData.length === 0) return alert("Trip empty hai!");
            if (confirm("Kya aap Trip End karke History mein save karna chahte hain?")) {
                let history = JSON.parse(localStorage.getItem('tripHistory')) || [];
                history.push({ name: tripName || "Untitled Trip", date: new Date().toLocaleDateString(), data: currentTripData });
                localStorage.setItem('tripHistory', JSON.stringify(history));
                
                // Clear current
                currentTripData = [];
                tripName = "";
                localStorage.removeItem('currentTrip');
                localStorage.removeItem('tripName');
                location.reload();
            }
        }

        function setupReminders() {
            setInterval(() => {
                if (currentTripData.length > 0) {
                    if (confirm("Are you Ready To Post Your Location? 📍")) {
                        recordLocation();
                    }
                }
            }, 1800000); // 30 Mins
        }
    </script>
</body>
</html>
